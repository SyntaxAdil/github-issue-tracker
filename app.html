<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>
    <!-- Daisy & Tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Fontawesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      html {
        background: #f8fafc;
      }
      .font-geist {
        font-family: "Geist", sans-serif;
      }
      .filter_btn_active {
        background-color: #4a00ff;
        color: white;
      }
    </style>
  </head>
  <body class="font-geist bg-[#f8fafc] min-h-screen w-full">
    <!-- navbar -->
    <header>
      <nav
        class="bg-white shadow p-4 navbar flex justify-between items-center flex-col md:flex-row gap-4 fixed top-0 left-0 right-0 z-9"
      >
        <div class="flex gap-2 items-center">
          <img
            src="./assets//github-logo.png"
            alt="github-logo"
            class="w-10 h-10"
          />
          <h2 class="text-2xl md:text-[36px] font-semibold text-black">
            GitHub Issues Tracker
          </h2>
        </div>
        <div class="flex gap-4">
          <label class="input outline-0">
            <i class="fa-solid fa-magnifying-glass text-[#64748b]"></i>
            <input
              type="search"
              id="user-search-input"
              class="grow text-[#64748b]"
              placeholder="Search issues..."
            />
          </label>
          <button class="btn bg-[#4a00ff] text-white" type="button">
            Search Issue
          </button>
        </div>
      </nav>
    </header>

    <!-- main -->
    <main class="max-w-[1110px] mx-auto container mb-8 md:mb-15 mt-50 md:mt-30">
      <!-- filter btn -->

      <div class="bg-white p-6 rounded-md w-full btn-grp space-x-2 shadow">
        <button
          data-target="all"
          class="btn md:px-[38px] bg-white text-[#64748b] filter_btn_active"
        >
          All
        </button>
        <button
          data-target="open"
          class="btn md:px-[38px] bg-white text-[#64748b]"
        >
          Open
        </button>
        <button
          data-target="closed"
          class="btn md:px-[38px] bg-white text-[#64748b]"
        >
          Closed
        </button>
      </div>

      <!-- popup -->
      <div
        class="hidden bg-[#002c5c73] min-h-screen w-full flex items-center justify-center fixed top-0 left-0 z-10"
        id="popup-info"
      ></div>

      <section class="shadow rounded-md">
        <!-- dispaly -->
        <div
          class="p-6 rounded-md bg-white mt-4 flex justify-between items-center flex-wrap gap-4"
        >
          <div class="flex gap-2">
            <img
              src="./assets/Aperture.png"
              class="w-[50px] h-[50px] bg-[#ece4ff] p-[9px] rounded-full"
            />
            <div>
              <h3 class="font-semibold text-[20px]">
                <span id="issue-count"></span> Issues
              </h3>
              <p class="text-[#64748b]">Track and manage your project issues</p>
            </div>
          </div>

          <div class="flex items-center  gap-2 ms-2 ">
            <span class="inline-block rounded-full w-3 h-3 bg-[#00a96e] animate-pulse"></span>
            <span>Open</span>
            <span
              class="inline-block rounded-full w-3 h-3 bg-[#a855f7] ms-2 animate-pulse" 
            ></span>
            <span>Closed</span>
          </div>
        </div>
        <section class="sections-container">
          <!-- all -->
          <section
            id="all"
            class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 p-6 bg-[#fbfbfb]"
          ></section>
        </section>
      </section>
    </main>

    <script src="./js/app.js"></script>
  </body>
</html>
