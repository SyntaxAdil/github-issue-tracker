<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker - Login</title>
    <!-- Daisy & Tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Fontawesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      .font-geist {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body class="font-geist">
    <section
      class="min-h-screen w-full bg-[#f8fafc] flex items-center justify-center"
    >
      <div class="container w-full max-w-[520px] p-4 md:p-8 rounded-md bg-white shadow">
        <!-- logo display -->
        <div class="text-center mb-6">
          <img
            src="./assets//github-logo.png"
            alt="github-logo"
            class="mx-auto w-[100px] mb-6"
          />

          <h1 class="font-semibold text-2xl">GitHub Issues Tracker</h1>
          <p class="text-[#64748b]">Sign in to manage your issues</p>
        </div>
        <!-- login form -->
        <div class="space-y-2">
          <!-- username -->
          <label class="label font-medium">Username</label>
          <input
            type="text"
            class="input w-full outline-0"
            placeholder="Enter Username"
            id="user-name-input"
          />
          <span class="text-[#4a00ff] text-sm ">Default: admin</span>
          <!-- pass -->
          <label class="label block mt-4  font-medium">Password</label>
          <input
            type="password"
            class="input w-full outline-0"
            placeholder="Enter Password"
            id="user-pass-input"
          />
          <span class="text-[#4a00ff] text-sm">Default: admin123</span>

          <!-- btn -->
          <button class="btn bg-[#4a00ff] text-white w-full mt-6 mb-3" id="user-signin-btn">
            Sign In
          </button>
        </div>

        <!-- divider -->
        <div class="divider divider-[##E4E4E7]">
          <span class="text-[#1F2937]">OR</span>
        </div>

        <!-- demo -->

        <div class="text-center">
          <h3 class="mt-6 text-sm text-[#64748b]" >Demo Credentials:</h3>

          <div class="bg-[#f8fafc] p-6 rounded-md text-black mt-2 text-base">
            <p><b>Username:</b> admin</p>

            <p><b>Password:</b> admin123</p>
          </div>
        </div>
      </div>
    </section>


    <!-- script -->
    <script src="./js/login.js"></script>
  </body>
</html>
